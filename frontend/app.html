<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="config.js"></script>
<style>
:root{
  --bg:#0a1310; --surface:#12211c; --surface2:#16281f;
  --border:rgba(231,181,77,.16); --border-soft:rgba(255,255,255,.06);
  --gold:#e7b54d; --gold-deep:#b9852a;
  --emerald:#2e9c6d; --emerald-deep:#1f7a56;
  --terracotta:#d1544a;
  --ink:#f3eee2; --ink-dim:#a9b6ab; --ink-faint:#5f7268;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;padding-bottom:84px;min-height:100%;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 35% at 12% -8%,rgba(46,156,109,.18) 0%,transparent 65%),
    radial-gradient(ellipse 55% 35% at 105% 0%,rgba(231,181,77,.11) 0%,transparent 65%);
}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:18px 14px 8px;}
::-webkit-scrollbar{display:none}

/* ── Keyframes ──────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseRing{0%{transform:scale(.85);opacity:.9}70%{transform:scale(1.35);opacity:0}100%{opacity:0}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes tickDraw{from{stroke-dashoffset:32}to{stroke-dashoffset:0}}
@keyframes barSlide{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}

/* ── Splash / boot screen ───────────── */
#splash{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  transition:opacity .45s ease,visibility .45s ease;
}
#splash::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 15% -8%,rgba(46,156,109,.22) 0%,transparent 65%),
    radial-gradient(ellipse 55% 40% at 105% 100%,rgba(231,181,77,.16) 0%,transparent 65%);
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.splash-mark{position:relative;width:84px;height:84px;display:flex;align-items:center;justify-content:center;z-index:1;}
.splash-mark .ping{position:absolute;inset:0;border-radius:50%;border:2px solid var(--gold);animation:pulseRing 1.8s cubic-bezier(.3,.6,.4,1) infinite;}
.splash-mark .ping:nth-child(2){animation-delay:.6s;}
.splash-mark .core{
  position:relative;width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,#1f7a56,#2e9c6d 45%,#e7b54d);
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-weight:800;font-size:1.3rem;color:#0a1310;
  box-shadow:0 0 40px rgba(231,181,77,.35);
}
.splash-ring{position:absolute;inset:-9px;border-radius:50%;border:2.5px solid transparent;border-top-color:var(--gold);border-right-color:var(--gold);animation:spin 1s linear infinite;}
.splash-word{font-family:'Sora',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:.02em;color:var(--ink);z-index:1;}
.splash-word span{color:var(--gold);}
.splash-track{width:170px;height:4px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;position:relative;z-index:1;}
.splash-track i{position:absolute;top:0;left:0;height:100%;width:40%;border-radius:99px;background:linear-gradient(90deg,var(--emerald),var(--gold));animation:barSlide 1.1s ease-in-out infinite;}
.splash-sub{font-size:.68rem;color:var(--ink-faint);letter-spacing:.05em;z-index:1;}

/* ── Skeleton loading ───────────────── */
.skel{
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:14px;
}
.skel-hero{height:168px;margin-bottom:14px;border-radius:20px;}
.skel-line{height:14px;border-radius:7px;margin-bottom:10px;}
.skel-card{height:64px;margin-bottom:10px;border-radius:15px;}

/* ── Cascade reveal (top-to-bottom) ──── */
.cascade>*{opacity:0;animation:fadeSlideUp .5s cubic-bezier(.2,.7,.3,1) forwards;}
.cascade>*:nth-child(1){animation-delay:.02s}
.cascade>*:nth-child(2){animation-delay:.09s}
.cascade>*:nth-child(3){animation-delay:.16s}
.cascade>*:nth-child(4){animation-delay:.23s}
.cascade>*:nth-child(5){animation-delay:.30s}
.cascade>*:nth-child(6){animation-delay:.37s}
.cascade>*:nth-child(n+7){animation-delay:.44s}

/* ── Circular spin loader (buttons / inline) ── */
.spin-ico{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px;}
.task-btn.dark-spin .spin-ico{border-color:rgba(36,26,5,.35);border-top-color:#241a05;}
.btn .spin-ico{margin-right:7px;}

/* ── Success check burst ─────────────── */
.check-burst{
  width:56px;height:56px;margin:0 auto 10px;border-radius:50%;
  background:rgba(46,156,109,.14);display:flex;align-items:center;justify-content:center;
  animation:popIn .45s cubic-bezier(.2,.8,.3,1.2);
}
.check-burst svg{width:28px;height:28px;}
.check-burst svg path{stroke-dasharray:32;stroke-dashoffset:32;animation:tickDraw .4s .15s ease forwards;}

/* ── Force-channel gate (blocks dashboard until joined) ── */
#gate{
  position:fixed;inset:0;z-index:80;background:var(--bg);display:flex;flex-direction:column;
  padding:26px 18px calc(20px + env(safe-area-inset-bottom));
}
#gate::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 15% -8%,rgba(46,156,109,.2) 0%,transparent 65%),
             radial-gradient(ellipse 55% 40% at 105% 100%,rgba(231,181,77,.13) 0%,transparent 65%);
}
.gate-head{position:relative;z-index:1;text-align:center;margin:10px 0 22px;}
.gate-badge{
  width:60px;height:60px;margin:0 auto 14px;border-radius:18px;
  background:linear-gradient(135deg,#1f7a56,#2e9c6d);display:flex;align-items:center;
  justify-content:center;font-size:1.5rem;box-shadow:0 14px 34px rgba(46,156,109,.3);
}
.gate-head h1{font-family:'Sora',sans-serif;font-size:1.15rem;font-weight:800;margin-bottom:6px;}
.gate-head p{font-size:.82rem;color:var(--ink-dim);line-height:1.4;padding:0 8px;}
#gateList{position:relative;z-index:1;flex:1;overflow-y:auto;}
.gate-ch{
  display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border-soft);
  border-radius:16px;padding:14px;margin-bottom:10px;animation:fadeSlideUp .4s ease forwards;opacity:0;
}
.gate-ch .gc-ic{width:38px;height:38px;border-radius:11px;background:rgba(231,181,77,.14);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.gate-ch .gc-name{font-weight:700;font-size:.85rem;flex:1;min-width:0;}
.gate-ch a.btn{width:auto;padding:9px 16px;font-size:.75rem;flex-shrink:0;}
#gateFooter{position:relative;z-index:1;padding-top:14px;}

/* ── Header ─────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.brand{display:flex;align-items:center;gap:9px;font-family:'Sora',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-.01em;color:var(--ink);}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px rgba(231,181,77,.8);}
.bal-chip{
  display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);
  padding:7px 13px;border-radius:99px;font-weight:700;font-size:.8rem;color:var(--gold);
  font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;
}

/* ── Cards ──────────────────────────── */
.card{
  background:var(--surface);border:1px solid var(--border-soft);border-radius:18px;
  padding:18px;margin-bottom:12px;box-shadow:0 14px 32px rgba(0,0,0,.4);
}

/* ── Hero — banknote-inspired balance card ─── */
.hero{
  background:linear-gradient(160deg,#16291f,#0e1a15 75%);border:1px solid var(--border);
  border-radius:20px;padding:24px 20px 20px;margin-bottom:14px;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;pointer-events:none;opacity:.55;
  background:repeating-linear-gradient(115deg,rgba(231,181,77,.06) 0 2px,transparent 2px 8px);
  mask-image:linear-gradient(180deg,#000,transparent 70%);
  -webkit-mask-image:linear-gradient(180deg,#000,transparent 70%);
}
.hero::after{
  content:'';position:absolute;top:-45%;right:-15%;width:65%;height:150%;
  background:radial-gradient(ellipse,rgba(231,181,77,.18),transparent 70%);pointer-events:none;
}
.hero .chip{
  width:34px;height:24px;border-radius:6px;position:relative;z-index:1;margin-bottom:14px;
  background:linear-gradient(135deg,#e7b54d,#a97a26);box-shadow:inset 0 0 0 1px rgba(0,0,0,.25);
}
.hero .chip::before{content:'';position:absolute;inset:4px;border:1px solid rgba(0,0,0,.3);border-radius:3px;}
.hero .label{font-size:.72rem;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.1em;font-weight:700;position:relative;z-index:1;}
.hero .amount{
  font-family:'JetBrains Mono',monospace;font-size:2.35rem;font-weight:700;color:#fff;letter-spacing:-.02em;
  margin:6px 0 3px;font-variant-numeric:tabular-nums;position:relative;z-index:1;
}
.hero .amount span{font-size:1.05rem;color:var(--gold);font-weight:700;font-family:'Sora',sans-serif;}
.hero .sub{font-size:.76rem;color:var(--ink-faint);position:relative;z-index:1;}
.stat-row{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1;}
.stat-box{flex:1;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:11px 12px;}
.stat-box .n{font-family:'JetBrains Mono',monospace;font-size:1.08rem;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
.stat-box .l{font-size:.63rem;color:var(--ink-faint);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}

h2.sect{font-family:'Sora',sans-serif;font-size:.76rem;font-weight:700;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.09em;margin:20px 0 10px;}

/* ── Buttons ────────────────────────── */
.btn{
  display:block;width:100%;text-align:center;padding:14px;border-radius:13px;border:none;
  font-weight:700;font-size:.86rem;font-family:'Sora',sans-serif;cursor:pointer;color:#fff;
  background:linear-gradient(135deg,#1f7a56,#2e9c6d);letter-spacing:.01em;
  transition:transform .15s ease,filter .15s ease;
}
.btn:active{transform:scale(.98);filter:brightness(.95);}
.btn:disabled{opacity:.4;cursor:default;transform:none;}
.btn.gold{background:linear-gradient(135deg,#b9852a,#e7b54d);color:#241a05;}
.btn.ghost{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--ink-dim);}
.btn.sm{padding:10px;font-size:.78rem;border-radius:10px;}
.btn.danger{background:linear-gradient(135deg,#8f2f28,#d1544a);}
input,select,textarea{
  width:100%;background:#0b1512;border:1px solid rgba(255,255,255,.09);color:var(--ink);
  padding:12px 13px;border-radius:11px;font-size:.86rem;font-family:'Inter',inherit;margin-bottom:10px;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:rgba(46,156,109,.55);}
label.f{font-size:.71rem;color:var(--ink-faint);font-weight:700;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.04em;}

/* ── Task cards ─────────────────────── */
.task{
  display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border-soft);
  border-left:3px solid var(--emerald);border-radius:15px;padding:13px 14px;margin-bottom:10px;
  transition:opacity .3s;
}
.task.completed{opacity:.5;border-left-color:var(--ink-faint);}
.task-ic{width:40px;height:40px;border-radius:11px;background:rgba(46,156,109,.14);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.task-body{flex:1;min-width:0;}
.task-title{font-size:.85rem;font-weight:700;color:var(--ink);}
.task-reward{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--gold);font-weight:700;margin-top:3px;}
.task-btn{
  flex-shrink:0;padding:9px 14px;border-radius:10px;border:none;font-weight:700;font-size:.75rem;
  cursor:pointer;font-family:'Sora',sans-serif;min-width:78px;
}
.task-btn.join{background:linear-gradient(135deg,#1f7a56,#2e9c6d);color:#fff;}
.task-btn.wait{background:rgba(255,255,255,.06);color:var(--ink-faint);}
.task-btn.check{background:linear-gradient(135deg,#2f6fb0,#4a90d9);color:#fff;}
.task-btn.claim{background:linear-gradient(135deg,#b9852a,#e7b54d);color:#241a05;}
.task-btn.done{background:rgba(46,156,109,.12);color:#6fcf9e;}
.task-btn.busy{opacity:.85;cursor:default;}
.task.completed{transition:opacity .4s,transform .4s;}

/* ── Bottom nav ─────────────────────── */
.navbar{
  position:fixed;left:0;right:0;bottom:0;z-index:5;
  background:rgba(10,19,16,.9);backdrop-filter:blur(16px);border-top:1px solid var(--border-soft);
  display:flex;justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom));
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;
  color:var(--ink-faint);font-family:'Sora',sans-serif;font-size:.6rem;font-weight:700;cursor:pointer;
  padding:6px 12px;border-radius:12px;transition:background .2s,color .2s;
}
.nav-btn .ic{font-size:1.1rem;}
.nav-btn.active{color:var(--gold);background:rgba(231,181,77,.1);}

/* ── Misc ───────────────────────────── */
.copybox{display:flex;gap:8px;}
.copybox input{margin-bottom:0;font-size:.74rem;font-family:'JetBrains Mono',monospace;}
.toast{
  position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;
  transform:translateX(-50%) translateY(-140%);
  min-width:200px;max-width:calc(100% - 32px);
  background:var(--surface2);border:1px solid var(--border);color:var(--ink);
  padding:12px 16px 12px 12px;border-radius:16px;font-size:.82rem;font-weight:600;
  display:flex;align-items:center;gap:10px;
  opacity:0;transition:transform .4s cubic-bezier(.2,.8,.2,1),opacity .3s;z-index:60;
  box-shadow:0 18px 44px rgba(0,0,0,.55);font-family:'Sora',sans-serif;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast .t-ic{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:.82rem;font-weight:800;
}
.toast.success .t-ic{background:rgba(46,156,109,.18);color:#6fcf9e;}
.toast.error .t-ic{background:rgba(209,84,74,.18);color:#f0847a;}
.toast.info .t-ic{background:rgba(231,181,77,.18);color:var(--gold);}
.toast .t-msg{line-height:1.3;}
.empty{text-align:center;padding:34px 10px;color:var(--ink-faint);font-size:.82rem;}
.pill-tag{display:inline-block;font-family:'Sora',sans-serif;font-size:.58rem;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.04em;}
.pill-tag.force{background:rgba(209,84,74,.15);color:#e8837a;}
.pill-tag.fake{background:rgba(231,181,77,.15);color:var(--gold);}
.row2{display:flex;gap:8px;}
.row2>*{flex:1;}
.admin-nav{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;}
.admin-nav button{
  flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--ink-dim);
  padding:8px 14px;border-radius:99px;font-size:.72rem;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;
}
.admin-nav button.active{background:var(--emerald);border-color:var(--emerald);color:#fff;}
.list-item{
  display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.list-item:last-child{border-bottom:none;}
.mini{font-size:.68rem;color:var(--ink-faint);}
.loading{text-align:center;padding:44px;color:var(--ink-faint);font-size:.85rem;font-family:'Sora',sans-serif;}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-mark">
    <span class="ping"></span><span class="ping"></span>
    <div class="core">HF</div>
    <div class="splash-ring"></div>
  </div>
  <div class="splash-word">HF <span>EARN V4</span></div>
  <div class="splash-track"><i></i></div>
</div>

<div id="gate" style="display:none">
  <div class="gate-head">
    <div class="gate-badge">📢</div>
    <h1>Join to Continue</h1>
    <p>Please join the channel(s) below, then tap "I've Joined" to unlock your dashboard.</p>
  </div>
  <div id="gateList"></div>
  <div id="gateFooter">
    <button class="btn gold" id="gateRecheckBtn" onclick="recheckGate()">✅ I've Joined</button>
  </div>
</div>

<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="dot"></span>HF EARN V4</div>
    <div class="bal-chip" id="topBal">— Birr</div>
  </div>
  <div id="view"></div>
</div>

<div class="toast" id="toast"></div>

<div class="navbar" id="navbar">
  <button class="nav-btn active" data-tab="home"><span class="ic">🏠</span>Home</button>
  <button class="nav-btn" data-tab="tasks"><span class="ic">🧩</span>Tasks</button>
  <button class="nav-btn" data-tab="invite"><span class="ic">🔗</span>Invite</button>
  <button class="nav-btn" data-tab="withdraw"><span class="ic">💸</span>Withdraw</button>
  <button class="nav-btn" id="adminNavBtn" data-tab="admin" style="display:none"><span class="ic">⚙️</span>Admin</button>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════
   SETUP
   ══════════════════════════════════════════════════════════════════ */
const tg = window.Telegram?.WebApp || null;
if (tg) { tg.ready(); tg.expand(); }
const initData = tg?.initData || "";
const _p = new URLSearchParams(location.search);
const FORCE_ADMIN_TAB = _p.get("admin") === "1";

let ME = null;

function toast(msg, type){
  if (!type){
    if (/^(✅|🎉)/.test(msg)) type = "success";
    else if (/^(❌|🚫|⚠️)/.test(msg)) type = "error";
    else type = "info";
  }
  const icons = { success: "✓", error: "✕", info: "i" };
  const t = document.getElementById("toast");
  clearTimeout(t._h);
  t.classList.remove("show");
  t.className = "toast " + type;
  t.innerHTML = `<span class="t-ic">${icons[type]}</span><span class="t-msg">${escapeHtml(msg)}</span>`;
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add("show")));
  t._h = setTimeout(() => t.classList.remove("show"), 2600);
}

async function api(path, body = {}) {
  const r = await fetch(`${BACKEND_URL}${path}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ initData, ...body }),
  });
  if (!r.ok) {
    let detail = "error";
    try { detail = (await r.json()).detail || detail; } catch {}
    throw new Error(detail);
  }
  return r.json();
}

function fmt(n){ return Number(n || 0).toFixed(2); }

/* ══════════════════════════════════════════════════════════════════
   NAV
   ══════════════════════════════════════════════════════════════════ */
const views = {};
let currentTab = "home";

document.getElementById("navbar").addEventListener("click", (e) => {
  const btn = e.target.closest(".nav-btn");
  if (!btn) return;
  switchTab(btn.dataset.tab);
});

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  render();
  tg?.HapticFeedback?.impactOccurred("light");
}

function skeletonFor(tab){
  if (tab === "home") return `
    <div class="skel skel-hero"></div>
    <div class="row2" style="margin-bottom:12px">
      <div class="skel" style="height:46px;border-radius:13px"></div>
      <div class="skel" style="height:46px;border-radius:13px"></div>
    </div>
    <div class="skel skel-line" style="width:40%"></div>
    <div class="skel skel-card"></div>`;
  if (tab === "tasks") return `

let taskTimer = null;

async function renderTasks(view){
  const [data] = await Promise.all([api("/api/tasks"), loadGateStatus().catch(() => null)]);
  clearInterval(taskTimer);

  const showFakeSection = !ME?.is_admin && GATE.fake_channels?.length && !GATE.fake_seen;
  const fakeSectionHTML = showFakeSection ? `
    <h2 class="sect" style="margin-top:0">Recommended Channels</h2>
    <div class="card" id="fakeChCard" style="display:flex;flex-direction:column;gap:8px;">
      ${GATE.fake_channels.map(c => `
        <div class="gate-ch" style="margin-bottom:0">
          <div class="gc-ic">📢</div>
          <div class="gc-name">${escapeHtml(c.channel_name)}</div>
          <a class="btn gold" href="${c.invite_link}" target="_blank" onclick="viewFakeChannel()">View</a>
        </div>
      `).join("")}
    </div>
  ` : "";

  if (!data.tasks.length){
    view.innerHTML = fakeSectionHTML + `<h2 class="sect">Tasks</h2><div class="empty">📭 No tasks right now. Check back later!</div>`;
    return;
  }

  view.innerHTML = fakeSectionHTML + `<h2 class="sect">Tasks — Join & Earn</h2><div id="taskList" class="cascade"></div>`;
  const list = document.getElementById("taskList");

  // Server only tells us "claimable" once the wait timer is done — we then
  // split that single state into a real two-tap flow: Check (verifies
  // membership) → Claim (pays the reward). uiStage tracks that locally.
  function paint(){
    list.innerHTML = data.tasks.map(t => taskCardHTML(t)).join("");
  }
  paint();

  taskTimer = setInterval(() => {
    let dirty = false;
    data.tasks.forEach(t => {
      if (t.status === "waiting" && t.wait_left > 0){
        t.wait_left -= 1;
        if (t.wait_left <= 0){ t.status = "claimable"; t.uiStage = "check"; }
        dirty = true;
      }
    });
    if (dirty) paint();
  }, 1000);

  window._taskAction = async (id, action) => {
    const t = data.tasks.find(x => x.id === id);
    if (!t) return;

    if (action === "join"){
      if (t.invite_link) window.open(t.invite_link, "_blank");
      try {
        const r = await api("/api/tasks/join", { task_id: id });
        t.status = "waiting";
        t.wait_left = r.wait_seconds;
        paint();
      } catch (e){ toast("⚠️ Couldn't start this task."); }
      return;
    }

    if (action === "check"){
      t.uiStage = "checking";
      paint();
      tg?.HapticFeedback?.impactOccurred("light");
      try {
        await api("/api/tasks/check", { task_id: id });
        t.uiStage = "claim";
        paint();
      } catch (e){
        t.uiStage = "check";
        if (e.message.startsWith("wait:")){
          toast(`⏳ Wait ${e.message.split(":")[1]}s more`);
        } else if (e.message === "not_member"){
          toast("❌ You haven't joined the channel yet — join then tap Check again.");
        } else {
          toast("⚠️ Couldn't verify. Try again.");
        }
        paint();
      }
      return;
    }

    if (action === "claim"){
      t.uiStage = "claiming";
      paint();
      try {
        const r = await api("/api/tasks/claim", { task_id: id });
        if (r.status === "completed"){
          t.status = "completed";
          toast(`🎉 +${fmt(r.reward)} Birr credited!`);
          document.getElementById("topBal").textContent = `${fmt(r.balance)} Birr`;
          tg?.HapticFeedback?.notificationOccurred("success");
        }
        paint();
      } catch (e){
        t.uiStage = "claim";
        toast("⚠️ Something went wrong. Try again.");
        paint();
      }
    }
  };
}

function taskCardHTML(t){
  const typeTag = t.task_type === "force" ? "" : `<span class="pill-tag fake">QUICK</span>`;
  let btn;
  if (t.status === "completed"){
    btn = `<button class="task-btn done" disabled>✓ Done</button>`;
  } else if (t.status === "waiting"){
    btn = `<button class="task-btn wait" disabled>⏳ ${t.wait_left}s</button>`;
  } else if (t.status === "claimable"){
    const stage = t.uiStage || "check";
    if (stage === "checking"){
      btn = `<button class="task-btn check busy" disabled><span class="spin-ico"></span> Checking</button>`;
    } else if (stage === "claim"){
      btn = `<button class="task-btn claim" onclick="_taskAction(${t.id},'claim')">Claim</button>`;
    } else if (stage === "claiming"){
      btn = `<button class="task-btn claim dark-spin busy" disabled><span class="spin-ico"></span> Claiming</button>`;
    } else {
      btn = `<button class="task-btn check" onclick="_taskAction(${t.id},'check')">Check</button>`;
    }
  } else {
    btn = `<button class="task-btn join" onclick="_taskAction(${t.id},'join')">Join</button>`;
  }
  return `
    <div class="task ${t.status === 'completed' ? 'completed' : ''}">
      <div class="task-ic">📢</div>
      <div class="task-body">
        <div class="task-title">${escapeHtml(t.title)} ${typeTag}</div>
        <div class="task-reward">+${fmt(t.reward)} Birr</div>
      </div>
      ${btn}
    </div>
  `;
}

function escapeHtml(s){
  return String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function adminTaskRow(t, i, total){

  const activeTag = t.is_active ? "" : `<span class="mini" style="color:#f87171"> (inactive)</span>`;

        <button class="btn sm ghost" style="width:auto" onclick="moveTask(${t.id},1)" ${i===total-1?"disabled":""}>↓</button>
        <button class="btn sm ghost" style="width:auto" onclick="toggleTask(${t.id},${t.is_active?0:1})">${t.is_active?"⏸":"▶"}</button>
        <button class="btn sm danger" style="width:auto" onclick="deleteTask(${t.id})">🗑</button>

async function createTask(){
  const title = document.getElementById("atTitle").value.trim();
  const task_type = document.getElementById("atType").value;
  const channel_id = document.getElementById("atChannelId").value.trim();
  const invite_link = document.getElementById("atLink").value.trim();
  const reward = parseFloat(document.getElementById("atReward").value || 0);
  if (!title) return toast("❌ Enter a title");
  try {
    const r = await api("/api/admin/tasks/create", { title, task_type, channel_id, invite_link, reward });
    toast("✅ Task added");
    if (confirm(`Broadcast "${title}" to all users now?\n\nEveryone will get a message with an "Open App" button so they can jump in and do it.`)) {
      toast("📤 Broadcasting…");
      try {
        const b = await api("/api/admin/tasks/broadcast", { task_id: r.task_id });
        toast(`✅ Announced to ${b.sent} users (${b.failed} failed)`);
      } catch (e){ toast("❌ Broadcast failed: " + e.message); }
    }
    paintAdminBody();
  } catch (e){ toast("❌ " + e.message); }

async function deleteTask(id){
  await api("/api/admin/tasks/delete", { id });

  paintAdminBody();

async function toggleTask(id, newState){
  await api("/api/admin/tasks/update", { id, is_active: newState });

async function moveTask(id, dir){
  const tasks = window._tasksCache || [];
  const idx = tasks.findIndex(t => t.id === id);
  const swapWith = idx + dir;
  if (swapWith < 0 || swapWith >= tasks.length) return;
  [tasks[idx], tasks[swapWith]] = [tasks[swapWith], tasks[idx]];
  await api("/api/admin/tasks/reorder", { order: tasks.map(t => t.id) });
  paintAdminBody();
}

async function adminUsers(body){
  body.innerHTML = `
    <div class="card">
      <label class="f">Telegram User ID</label>
      <input id="auId" type="number" placeholder="123456789">
      <button class="btn ghost" onclick="searchUser()">🔍 Search</button>
      <div id="userResult" style="margin-top:12px"></div>
    </div>
  `;
}
async function searchUser(){
  const uid = parseInt(document.getElementById("auId").value);
  if (!uid) return toast("❌ Enter a user ID");
  const box = document.getElementById("userResult");
  try {
    const u = await api("/api/admin/users/search", { user_id: uid });
    box.innerHTML = `
      <div class="list-item">
        <div>
          <div style="font-weight:700">${escapeHtml(u.full_name)} ${u.username ? '@'+escapeHtml(u.username) : ''}</div>
          <div class="mini">Balance: ${fmt(u.balance)} · Refs: ${u.referrals} · ${u.is_banned ? '🚫 Banned' : '✅ Active'}</div>
        </div>
      </div>
      <div class="row2" style="margin-top:10px">
        <button class="btn sm ${u.is_banned ? '' : 'danger'}" onclick="toggleBan(${uid}, ${u.is_banned ? 0 : 1})">${u.is_banned ? '✅ Unban' : '🚫 Ban'}</button>
        <button class="btn sm ghost" onclick="adjustBalance(${uid})">✍️ Adjust Balance</button>
      </div>
    `;
  } catch (e){ box.innerHTML = `<div class="empty">User not found.</div>`; }
}
async function toggleBan(uid, banned){
  await api("/api/admin/users/ban", { user_id: uid, banned });
  toast(banned ? "🚫 Banned" : "✅ Unbanned");
  searchUser();
}
async function adjustBalance(uid){
  const amt = parseFloat(prompt("Amount to add (negative to subtract):") || "0");
  if (!amt) return;
  await api("/api/admin/users/balance", { user_id: uid, amount: amt });
  toast("✅ Balance updated");
  searchUser();
}

/* ── Admin: Settings ──────────────────────────────────────────── */
async function adminSettings(body){
  const s = await api("/api/admin/settings");
  body.innerHTML = `
    <div class="card">
      <label class="f">Reward per Referral (Birr)</label>
      <input id="stReward" type="number" value="${s.reward_per_referral}">
      <label class="f">Minimum Withdrawal (Birr)</label>
      <input id="stMinWd" type="number" value="${s.min_withdrawal}">
      <button class="btn gold" onclick="saveSettings()">💾 Save Settings</button>
    </div>
  `;
}
async function saveSettings(){
  const reward_per_referral = parseFloat(document.getElementById("stReward").value);
  const min_withdrawal = parseFloat(document.getElementById("stMinWd").value);
  await api("/api/admin/settings/update", { reward_per_referral, min_withdrawal });
  toast("✅ Settings saved");
}

/* ── Admin: Broadcast ─────────────────────────────────────────── */
async function adminBroadcast(body){
  body.innerHTML = `
    <div class="card">
      <label class="f">Message to all users</label>
      <textarea id="bcText" rows="5" placeholder="Type your announcement…"></textarea>
      <button class="btn gold" onclick="sendBroadcast()">📢 Send Broadcast</button>
    </div>
  `;
}
async function sendBroadcast(){
  const text = document.getElementById("bcText").value.trim();
  if (!text) return toast("❌ Enter a message");
  if (!confirm("Send this to ALL users?")) return;
  toast("📤 Sending…");
  const r = await api("/api/admin/broadcast", { text });
  toast(`✅ Sent to ${r.sent} users (${r.failed} failed)`);
}

/* ══════════════════════════════════════════════════════════════════
   FORCE-CHANNEL GATE (blocks dashboard until real channels are joined)
   ══════════════════════════════════════════════════════════════════ */
let GATE = { force_unjoined: [], fake_channels: [], fake_seen: true };

async function loadGateStatus(){
  GATE = await api("/api/gate/status");
  return GATE;
}

function paintGate(){
  const list = document.getElementById("gateList");
  list.innerHTML = GATE.force_unjoined.map((c, i) => `
    <div class="gate-ch" style="animation-delay:${i * 0.07}s">
      <div class="gc-ic">📢</div>
      <div class="gc-name">${escapeHtml(c.channel_name)}</div>
      <a class="btn gold" href="${c.invite_link}" target="_blank" onclick="tg?.HapticFeedback?.impactOccurred('light')">Join</a>
    </div>
  `).join("");
}

async function recheckGate(){
  const btn = document.getElementById("gateRecheckBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="spin-ico" style="border-color:rgba(36,26,5,.35);border-top-color:#241a05"></span> Checking…`;
  try {
    await loadGateStatus();
    if (GATE.force_unjoined.length === 0){
      tg?.HapticFeedback?.notificationOccurred("success");
      toast("✅ Verified! Welcome in.");
      document.getElementById("gate").style.display = "none";
      await render();
    } else {
      paintGate();
      toast("❌ Still missing " + GATE.force_unjoined.length + " channel(s). Join then try again.");
    }
  } catch (e){
    toast("⚠️ Couldn't verify. Try again.");
  }
  btn.disabled = false;
  btn.innerHTML = "✅ I've Joined";
}

/* ══════════════════════════════════════════════════════════════════
   BOOT
   ══════════════════════════════════════════════════════════════════ */
(async () => {
  const MIN_SPLASH_MS = 1100; // keeps the intro from flashing on fast connections
  const started = Date.now();
  const splash = document.getElementById("splash");

  function dismissSplash(){
    const elapsed = Date.now() - started;
    const wait = Math.max(0, MIN_SPLASH_MS - elapsed);
    setTimeout(() => splash.classList.add("hide"), wait);
  }

  try {
    await refreshMe();

    if (!ME.is_admin){
      await loadGateStatus();
      if (GATE.force_unjoined.length > 0){
        paintGate();
        dismissSplash();
        document.getElementById("gate").style.display = "flex";
        return; // dashboard stays locked until recheckGate() succeeds
      }
    }

    if (FORCE_ADMIN_TAB && ME.is_admin){
      currentTab = "admin";
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === "admin"));
    }
    await render();
    dismissSplash();
  } catch (e) {
    document.getElementById("view").innerHTML =
      `<div class="empty">⚠️ ${e.message === "banned" ? "Your account has been banned." : "Couldn't load your data. Please reopen from the bot."}</div>`;
    dismissSplash();
  }
})();
</script>
